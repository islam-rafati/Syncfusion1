<div class="layout">
  <!-- Side navigation (collapsible). -->
  <app-sidebar class="layout__sidebar" [collapsed]="collapsed()"></app-sidebar>

  <div class="layout__main">
    <!-- Top header: sidebar toggle, title, notifications, user. -->
    <app-header class="layout__header" (toggleSidebar)="toggleSidebar()"></app-header>

    <!-- Routed feature content renders here. -->
    <main class="layout__content">
      <router-outlet />
    </main>
  </div>
</div>
