<header class="header">
  <!-- Start side (right in RTL): sidebar toggle + title. -->
  <div class="header__start">
    <button
      class="header__icon-btn"
      type="button"
      aria-label="تبديل القائمة الجانبية"
      (click)="toggleSidebar.emit()"
    >
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
      </svg>
    </button>

    <!-- Static title for now; the breadcrumb component plugs in later. -->
    <span class="header__title">منصة الخوارزمي</span>
  </div>

  <!-- End side (left in RTL): notifications + user. -->
  <div class="header__end">
    <button class="header__icon-btn" type="button" aria-label="الإشعارات">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
        <path
          d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
        />
      </svg>
      <!-- Unread count badge (Arabic numeral placeholder). -->
      <span class="header__badge">٣</span>
    </button>

    <div class="header__user">
      <svg
        class="header__avatar"
        viewBox="0 0 24 24"
        width="32"
        height="32"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"
        />
      </svg>
      <!-- Falls back to "زائر" (guest) until a user session exists. -->
      <span class="header__user-name">{{ user()?.fullName ?? 'زائر' }}</span>
    </div>
  </div>
</header>
