<!-- App bar: start group (menu, logo, title) ... end group (actions, avatar). -->
<header class="appbar">
  <div class="appbar__start">
    <button
      type="button"
      class="appbar__icon-btn appbar__icon-btn--filled"
      aria-label="Toggle menu"
    >
      <app-icon name="menu" [size]="18" />
    </button>

    <span class="appbar__logo" aria-hidden="true">
      <app-icon name="image" [size]="18" />
    </span>

    <span class="appbar__title">AL-Khwarizmi</span>
  </div>

  <div class="appbar__end">
    <button type="button" class="appbar__icon-btn" aria-label="Invite user">
      <app-icon name="person-add" [size]="18" />
    </button>
    <button type="button" class="appbar__icon-btn" aria-label="Notifications">
      <app-icon name="notifications" [size]="18" />
    </button>
    <button type="button" class="appbar__icon-btn" aria-label="Information">
      <app-icon name="info" [size]="18" />
    </button>
    <!-- Profile photo avatar (matches the Figma user image). -->
    <img class="appbar__avatar" src="user-avatar.png" alt="User profile" />
  </div>
</header>
