<!-- Footer: rows-per-page · numbered pager · summary. -->
<div class="pager">
  <!-- Start: rows per page. -->
  <div class="pager__rows">
    <span class="pager__label">Rows per page:</span>
    <span class="pager__select">
      <app-icon name="menu" [size]="16" />
      <span>{{ rowsPerPage() }}</span>
    </span>
  </div>

  <!-- Center: numbered pager. -->
  <nav class="pager__nav" aria-label="Pagination">
    <button type="button" class="pager__btn" aria-label="First page">
      <app-icon name="first-page" [size]="18" />
    </button>
    <button type="button" class="pager__btn" aria-label="Previous page">
      <app-icon name="chevron-left" [size]="18" />
    </button>

    @for (page of pages; track page) {
      <button
        type="button"
        class="pager__page"
        [class.pager__page--active]="currentPage() === page"
        [attr.aria-current]="currentPage() === page ? 'page' : null"
        (click)="onPage(page)"
      >
        {{ page }}
      </button>
    }

    <button type="button" class="pager__btn" aria-label="Next page">
      <app-icon name="chevron-right" [size]="18" />
    </button>
    <button type="button" class="pager__btn" aria-label="Last page">
      <app-icon name="last-page" [size]="18" />
    </button>
  </nav>

  <!-- End: summary. -->
  <span class="pager__summary">{{ summary() }}</span>
</div>
